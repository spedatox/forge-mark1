# Centurion — identity file 1 of 2 (the profile).
# The Forge's second agent, added purely as this sibling folder (§9): no Warden
# edit. Mirrors Mark VI's app/profiles/centurion.py — cyber security, defensive
# and authorized-offensive work on the owner's own assets.

agent_id = "centurion"
name = "Centurion"
domain = "cyber security"

# Model IDs live only in profiles (Rule 10). Same reasoning tier as Optimus.
model = "claude-sonnet-4-6"

# Tool allowlist — the "security" group: run security tooling in the Cell +
# read/write scan output and reports. This list IS the security boundary (§2/§4).
tools = ["security"]

# One working mode with the safety gate always on; "plan" would make it
# read-only for reviewing an intended engagement before it runs (§6).
permission_mode = "act"

# The single iteration ceiling (§3).
max_iterations = 30

[cell]
# Unlike Optimus, Centurion's work is inherently networked — recon, scanning,
# and authorized testing reach out. Outbound is ON. Everything else stays capped
# and non-root; the Cell is still throwaway and isolated per job.
allow_network = true
cpus          = 2.0
memory_mb     = 2048
# Scans and enumeration run longer than a build step — give commands more wall-clock.
timeout_s     = 300
# Centurion builds his lab from THIS image, not Optimus's python:3.12-slim — a
# per-agent override (cfg.cell.image) that wins over the process-wide
# FORGE_CELL_IMAGE. Point it at whatever security toolchain image the host has
# pulled (nmap/nikto/nuclei/…); kalilinux/kali-rolling is the broad default, but
# a slimmer purpose-built image works too. Under the subprocess backend (a
# Docker-less host) this is ignored and commands use whatever is installed
# locally — so on such hosts, install the tooling on the host instead.
image         = "kalilinux/kali-rolling"
run_as_root   = true
cap_add       = ["NET_RAW", "NET_ADMIN", "NET_BIND_SERVICE", "CHOWN", "DAC_OVERRIDE", "SETUID", "SETGID", "FOWNER"]
